# ============================================
# ステージング環境オーバーライド
# docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${STAGING_API_URL:-https://staging-api.example.com}
      - NODE_ENV=production
    restart: unless-stopped

  backend:
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=staging
      - APP_DEBUG=true
      - APP_URL=${STAGING_API_URL:-https://staging-api.example.com}
      - SANCTUM_STATEFUL_DOMAINS=${STAGING_FRONTEND_DOMAIN:-staging.example.com}
      - SESSION_DOMAIN=${STAGING_SESSION_DOMAIN:-.example.com}
      - CORS_ALLOWED_ORIGINS=${STAGING_FRONTEND_URL:-https://staging.example.com}
    command: php artisan serve --host=0.0.0.0 --port=8000
    restart: unless-stopped

  queue:
    environment:
      - APP_ENV=staging
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    restart: unless-stopped

  mysql:
    # ステージングではポート公開しない
    restart: unless-stopped

  redis:
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
