#
# anki-ai-flashcard - ステージング環境 (Traefik 統合)
#
# 使用方法:
#   cd ~/srv/apps/anki-ai-flashcard/repo
#   docker compose -f docker-compose.staging.yml up -d
#
# 前提:
#   - Traefik が起動済み (proxy ネットワーク作成済み)
#   - ../data/.env に環境変数を配置
#   - イメージは ghcr.io から pull (サーバー上でのビルド不要)
#
# アーキテクチャ:
#   Traefik → frontend (Next.js, port 3000)
#   Traefik → nginx (port 80) → backend (php-fpm, port 9000)
#   queue は backend と同じ image を使い artisan queue:work で起動
#
# backend image は docker/php/Dockerfile.prod でビルドされ、image 内に
# app コードと vendor/ を含む。volume mount は不要 (host コードは使わない)。
#
# ディレクトリ構成 (サーバー上):
#   ~/srv/apps/anki-ai-flashcard/
#   ├── repo/          <- このリポジトリ (このファイルの場所)
#   └── data/
#       ├── .env       <- ステージング環境変数
#       ├── mysql/     <- DBデータ
#       └── redis/     <- Redisデータ
#

services:
  # ----------------------------------------
  # Frontend - Next.js (pre-built image from ghcr.io)
  # ----------------------------------------
  frontend:
    image: ghcr.io/horita-kaito/anki_ai_flashcard-frontend:develop
    container_name: anki-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - proxy
      - default
    labels:
      - traefik.enable=true
      - traefik.http.routers.anki-frontend.rule=Host(`anki.takohorita.com`)
      - traefik.http.routers.anki-frontend.entrypoints=websecure
      - traefik.http.routers.anki-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.anki-frontend.priority=1
      - traefik.http.services.anki-frontend.loadbalancer.server.port=3000

  # ----------------------------------------
  # Backend - Laravel PHP-FPM (pre-built image, code baked in)
  # ----------------------------------------
  backend:
    image: ghcr.io/horita-kaito/anki_ai_flashcard-backend:develop
    container_name: anki-backend
    restart: unless-stopped
    expose:
      - "9000"
    env_file:
      - ../data/.env
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
      APP_TIMEZONE: Asia/Tokyo
      APP_URL: https://anki.takohorita.com
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_ENCRYPT: "true"
      SESSION_SECURE_COOKIE: "true"
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: anki.takohorita.com
      SANCTUM_TOKEN_PREFIX: ankiai_
      SESSION_DOMAIN: anki.takohorita.com
      CORS_ALLOWED_ORIGINS: https://anki.takohorita.com
      TRUSTED_PROXIES: "172.16.0.0/12,10.0.0.0/8"
      TZ: Asia/Tokyo
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default

  # ----------------------------------------
  # Nginx - PHP-FPM front (Traefik routed)
  # nginx はファイル共有せず、すべての API リクエストを backend (php-fpm)
  # にそのまま FastCGI で転送する thin proxy。
  # ----------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: anki-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - proxy
      - default
    labels:
      - traefik.enable=true
      - "traefik.http.routers.anki-api.rule=Host(`anki.takohorita.com`) && (PathPrefix(`/api`) || PathPrefix(`/sanctum`))"
      - traefik.http.routers.anki-api.entrypoints=websecure
      - traefik.http.routers.anki-api.tls.certresolver=letsencrypt
      - traefik.http.routers.anki-api.priority=10
      - traefik.http.services.anki-api.loadbalancer.server.port=80
      # HSTS / セキュリティヘッダ (Traefik レイヤで付与)
      - traefik.http.middlewares.anki-hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.anki-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.anki-hsts.headers.stsPreload=true
      - traefik.http.middlewares.anki-hsts.headers.forceSTSHeader=true
      - traefik.http.routers.anki-api.middlewares=anki-hsts

  # ----------------------------------------
  # Queue Worker (backend と同じ image、command だけ override)
  # ----------------------------------------
  queue:
    image: ghcr.io/horita-kaito/anki_ai_flashcard-backend:develop
    container_name: anki-queue
    restart: unless-stopped
    env_file:
      - ../data/.env
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
      APP_TIMEZONE: Asia/Tokyo
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      TZ: Asia/Tokyo
    depends_on:
      - backend
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    networks:
      - default

  # ----------------------------------------
  # MySQL
  # ----------------------------------------
  mysql:
    image: mysql:8.0
    container_name: anki-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3308:3306"
    env_file:
      - ../data/.env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-anki_ai_flashcard}
      MYSQL_USER: ${DB_USERNAME:-anki_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      TZ: Asia/Tokyo
    volumes:
      - ../data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # ----------------------------------------
  # Redis
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: anki-redis
    restart: unless-stopped
    volumes:
      - ../data/redis:/data
    networks:
      - default

# ----------------------------------------
# Networks
# ----------------------------------------
networks:
  proxy:
    external: true
  default:
    driver: bridge
