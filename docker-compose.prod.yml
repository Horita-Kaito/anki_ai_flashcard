# ============================================
# 本番環境オーバーライド
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    environment:
      - NEXT_PUBLIC_API_URL=${PROD_API_URL}
      - NODE_ENV=production
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${PROD_API_URL}
      - SANCTUM_STATEFUL_DOMAINS=${PROD_FRONTEND_DOMAIN}
      - SESSION_DOMAIN=${PROD_SESSION_DOMAIN}
      - CORS_ALLOWED_ORIGINS=${PROD_FRONTEND_URL}
      - LOG_CHANNEL=daily
    command: php artisan serve --host=0.0.0.0 --port=8000
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  queue:
    environment:
      - APP_ENV=production
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3 --max-jobs=1000 --max-time=3600
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  mysql:
    # 本番ではポート公開しない
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
