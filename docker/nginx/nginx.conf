# =================================================================
# Backend API 用 Nginx 設定 (PHP-FPM への薄い reverse proxy)
#
# このファイルは backend (php-fpm) コンテナとファイルシステムを共有しない
# 想定で書かれている。すべてのリクエストを FastCGI で /index.php に転送し、
# Laravel のルータに解決を委ねる。
#
# Traefik ですでに API パスのみがルーティングされている前提:
#   anki-api.rule = (PathPrefix(`/api`) || PathPrefix(`/sanctum`))
# のため、静的ファイル (favicon, css 等) はここに来ない。
# =================================================================

server {
    listen 80;
    server_name _;
    charset utf-8;

    # Security headers (Traefik 側でも HSTS を付与しているが、defense in depth)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml;

    # body 上限 (AI へ送る note 等を考慮して 10MB)
    client_max_body_size 10m;

    location / {
        include fastcgi_params;
        fastcgi_pass backend:9000;

        # nginx 側にコードがマウントされていないため、
        # SCRIPT_FILENAME は固定で /var/www/html/public/index.php を指す。
        # PHP-FPM コンテナ内で実体が解決される。
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # 隠しファイル拒否 (.env 等が万一公開ディレクトリに出ても抑止)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
