name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # Docker Build が完了するのを待つ
  wait-for-images:
    name: Wait for Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Docker Build workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build Frontend Image"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: wait-for-images
    permissions:
      contents: read
      packages: read
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            APP_ROOT="$HOME/srv/apps/anki-ai-flashcard"
            REPO_DIR="${APP_ROOT}/repo"
            COMPOSE_FILE="${REPO_DIR}/docker-compose.staging.yml"

            cd "$REPO_DIR"

            # 最新コード取得
            git fetch origin develop
            git reset --hard origin/develop

            # .env symlink (data/.env を compose の変数展開用に)
            ln -sf ../data/.env .env

            # ghcr.io ログイン & イメージ pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f "$COMPOSE_FILE" pull

            # Composer install (vendor/ は volume mount のため必要)
            docker compose -f "$COMPOSE_FILE" run --rm --no-deps \
              backend composer install --no-dev --no-interaction --optimize-autoloader

            # 起動
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans

            # マイグレーション & キャッシュ
            docker compose -f "$COMPOSE_FILE" exec -T backend php artisan migrate --force
            docker compose -f "$COMPOSE_FILE" exec -T backend php artisan config:cache
            docker compose -f "$COMPOSE_FILE" exec -T backend php artisan route:cache
            docker compose -f "$COMPOSE_FILE" exec -T backend php artisan view:cache

            echo "Deploy completed successfully"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deployment failed"
