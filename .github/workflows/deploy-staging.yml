name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.STAGING_APP_PATH }}
            git fetch origin develop
            git reset --hard origin/develop
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan migrate --force
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan config:cache
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan route:cache
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan view:cache

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deployment failed"
