name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Detect changes to skip unchanged jobs
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/php/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  # ============================================
  # Backend (Laravel)
  # ============================================
  backend-lint:
    name: Backend Lint (Pint)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, redis
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "composer.json not found; skipping"
            exit 0
          fi

      - name: Run Pint (lint check)
        run: |
          if [ -f vendor/bin/pint ]; then
            ./vendor/bin/pint --test
          else
            echo "Pint not installed; skipping"
          fi

  backend-security:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Run composer audit
        run: |
          if [ -f composer.json ]; then
            composer audit --no-interaction || true
          else
            echo "composer.json not found; skipping"
          fi

  backend-test:
    name: Backend Test (PHPUnit)
    runs-on: ubuntu-latest
    needs: [changes, backend-lint]
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, redis, bcmath
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist --no-progress
          else
            echo "composer.json not found; skipping"
            exit 0
          fi

      - name: Copy .env for testing
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi

      - name: Generate application key
        run: |
          if [ -f artisan ]; then
            php artisan key:generate --env=testing
          fi

      - name: Run migrations
        run: |
          if [ -f artisan ]; then
            php artisan migrate --env=testing --force
          fi

      - name: Run PHPUnit
        run: |
          if [ -f artisan ]; then
            php artisan test --coverage --min=0
          else
            echo "artisan not found; skipping tests"
          fi

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend-lint:
    name: Frontend Lint (ESLint + tsc)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "package.json not found; skipping"
            exit 0
          fi

      - name: Run ESLint
        run: |
          if [ -f package.json ] && npm run | grep -q "lint"; then
            npm run lint
          else
            echo "lint script not found; skipping"
          fi

      - name: TypeScript check
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi

  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run npm audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "package.json not found; skipping"
          fi

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs: [changes, frontend-lint]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            exit 0
          fi

      - name: Run tests
        run: |
          if [ -f package.json ] && npm run | grep -q "test"; then
            npm test -- --coverage --watchAll=false || npm test
          else
            echo "test script not found; skipping"
          fi

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: [changes, frontend-lint]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            exit 0
          fi

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          fi

  # ============================================
  # Final gate
  # ============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-lint
      - backend-test
      - backend-security
      - frontend-lint
      - frontend-test
      - frontend-build
      - frontend-security
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed or skipped"
